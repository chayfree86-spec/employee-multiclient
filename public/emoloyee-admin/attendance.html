<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe Attendance & Salary Management</title>
    <!-- Local App Font -->
    <link rel="preload" href="assets/fonts/google-sans-flex/GoogleSansFlex-400.ttf" as="font" type="font/ttf" crossorigin>
    <link rel="preload" href="assets/fonts/google-sans-flex/GoogleSansFlex-700.ttf" as="font" type="font/ttf" crossorigin>
    <link rel="preload" href="assets/fonts/google-sans-flex/GoogleSansFlex-800.ttf" as="font" type="font/ttf" crossorigin>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Flatpickr (Date Picker) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/plugins/monthSelect/style.css">
    <link rel="stylesheet" href="style.css?v=20260525-26">
</head>

<body class="theme-cafe">

    <div id="login-container" class="login-page hidden">
        <div class="login-card">
            <div class="login-header">
                <i class="fas fa-coffee login-logo"></i>
                <h1 style="color:var(--primary); font-size:2rem; margin-bottom:0.5rem;">User Login</h1>
                <p style="color:var(--text-muted); margin-bottom:2rem;">Enter your account details to continue.</p>
            </div>
            <form id="login-form">
                <div class="input-group">
                    <label
                        style="display:block; margin-bottom:0.5rem; font-weight:600; font-size:0.9rem;">Username / Mobile / Email</label>
                    <div class="input-wrapper" style="position:relative;">
                        <i class="fas fa-user"
                            style="position:absolute; left:1rem; top:50%; transform:translateY(-50%); color:var(--text-muted);"></i>
                        <input type="text" id="username" autocomplete="off" placeholder="Enter username, mobile, or email" required
                            style="width:100%; padding:0.8rem 1rem 0.8rem 2.8rem; border:1px solid var(--border); border-radius:12px; outline:none;">
                    </div>
                </div>
                <div class="input-group" style="margin-top:1.5rem;">
                    <label
                        style="display:block; margin-bottom:0.5rem; font-weight:600; font-size:0.9rem;">Password</label>
                    <div class="input-wrapper" style="position:relative;">
                        <i class="fas fa-lock"
                            style="position:absolute; left:1rem; top:50%; transform:translateY(-50%); color:var(--text-muted);"></i>
                        <input type="password" id="password" autocomplete="new-password" placeholder="Enter password" required
                            style="width:100%; padding:0.8rem 1rem 0.8rem 2.8rem; border:1px solid var(--border); border-radius:12px; outline:none;">
                    </div>
                </div>
                <button type="submit" class="btn-primary full-width" style="margin-top:2rem;">Login</button>
            </form>
        </div>
    </div>

    <div id="app-container" class="app-layout hidden">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-mug-hot sidebar-logo"></i>
                <div class="brand-info">
                    <h2>Cafe Admin</h2>
                    <p>Management System</p>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html?view=dashboard" class="nav-item" data-view="dashboard">
                    <i class="fas fa-th-large"></i>
                    <span>Dashboard</span>
                </a>
                <a href="staff.html" class="nav-item" data-view="staff">
                    <i class="fas fa-users-cog"></i>
                    <span>Staff</span>
                </a>
                <a href="attendance.html" class="nav-item active" data-view="attendance">
                    <i class="fas fa-calendar-alt"></i>
                    <span>Attendance</span>
                </a>
                <a href="salary.html" class="nav-item" data-view="salary">
                    <i class="fas fa-money-check-alt"></i>
                    <span>Salary</span>
                </a>
                <a href="reports.html" class="nav-item" data-view="reports">
                    <i class="fas fa-chart-bar"></i>
                    <span>Reports</span>
                </a>
            </nav>
            <div class="sidebar-bottom">
                <a href="settings.html" class="nav-item" data-view="settings" style="margin-bottom:0;">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </a>
                <button id="logout-btn" class="nav-item"
                    style="border:none; background:none; cursor:pointer; width:100%; margin-top:0.5rem;">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </button>
                <div class="user-profile-bar" id="sidebar-user-card" style="cursor:pointer;"
                    title="Update profile photo">
                    <img id="sidebar-user-avatar" src="" alt="User">
                    <div class="user-info">
                        <h4 id="sidebar-user-name">Admin User</h4>
                        <p id="sidebar-user-role">Administrator</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="app-header">
                <div class="header-search">
                    <div class="header-search-field" id="header-search-field">
                        <i class="fas fa-search"></i>
                        <input type="text" id="global-search" placeholder="Search staff by name or mobile...">
                    </div>
                    <div class="header-search-field hidden" id="header-profile-select-wrap">
                        <span class="header-search-tag">Profile</span>
                        <i class="fas fa-users"></i>
                        <select id="profile-staff-selector-header" aria-label="Select staff profile"></select>
                    </div>
                </div>
                <div class="header-actions">
                    <div class="datetime-widget" aria-live="polite">
                        <div class="datetime-icon"><i class="fas fa-calendar-days"></i></div>
                        <div class="datetime-copy">
                            <span id="current-date-label">Today</span>
                            <strong id="current-time-label">--:--</strong>
                        </div>
                    </div>
                </div>
            </header>

            <div id="view-container" class="content-body">
                <!-- Dashboard Overview populated here -->
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="modal-container" class="modal-overlay hidden">
        <div class="modal-card">
            <div class="modal-header">
                <h3 id="modal-title">Modal Title</h3>
                <button class="close-modal"><i class="fas fa-times"></i></button>
            </div>
            <div id="modal-body" class="modal-body">
                <!-- Modal content -->
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/flatpickr" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/plugins/monthSelect/index.js" defer></script>
    <script src="js/storage.js?v=20260525-3" defer></script>
    <script src="env.js?v=20260427-1" defer></script>
    <script src="js/api.js?v=20260525-8" defer></script>
    <script src="js/theme.js?v=20260313-1" defer></script>
    <script src="js/auth.js?v=20260525-10" defer></script>
    <script src="js/staff.js?v=20260525-26" defer></script>
    <script src="js/attendance.js?v=20260525-5" defer></script>
    <script src="js/salary.js?v=20260525-13" defer></script>
    <script src="js/reports.js?v=20260525-2" defer></script>
    <script src="js/settings.js?v=20260525-3" defer></script>
    <script src="js/main.js?v=20260525-10" defer></script>
</body>

</html>
